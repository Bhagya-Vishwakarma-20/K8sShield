# ATTACK PATH: sa-web (app namespace) → role-secret-reader (data namespace)
# This is the critical misconfiguration: an app SA getting data namespace secret access
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rb-web-reads-secrets
  namespace: data
subjects:
  - kind: ServiceAccount
    name: sa-web
    namespace: app               # cross-namespace binding — app SA gets data access
roleRef:
  kind: Role
  name: role-secret-reader
  apiGroup: rbac.authorization.k8s.io
