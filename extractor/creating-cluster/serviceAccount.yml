# SA for frontend pod — will be bound to overly-permissive role (attack path 1 starts here)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-frontend
  namespace: frontend
  labels: {}

---
# SA for backend pod — bound to role that can read secrets
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-backend
  namespace: backend
  labels: {}

---
# SA for webapp — middle-hop in the longest attack chain
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-webapp
  namespace: backend
  labels: {}

---
# SA for monitoring — has cluster-wide read (risky but common misconfiguration)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-monitor
  namespace: monitoring
  labels: {}

---
# SA for the DB job — should only read its own secret, but misconfigured with wildcard
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-db-job
  namespace: data
  labels: {}

---
# SA with circular permission (for DFS cycle detection test)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-service-a
  namespace: security-test
  labels: {}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sa-service-b
  namespace: security-test
  labels: {}